<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Calculadora de Porcentajes</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .calculadora {
            background: #16213e;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 0 30px rgba(0,200,255,0.2);
        }

        h1 { color: #00d4ff; }
        p  { color: #aaa; }

        input {
            display: block;
            margin: 10px auto;
            padding: 12px;
            width: 200px;
            border-radius: 10px;
            border: none;
            font-size: 16px;
        }

        button {
            margin-top: 15px;
            padding: 12px 30px;
            background: #00d4ff;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
        }

        #resultado {
            margin-top: 20px;
            font-size: 20px;
            color: #00ff99;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="calculadora">
        <h1>🧮 Calculadora de Porcentajes</h1>
        <p>Calculá porcentajes fácilmente</p>
        <input type="number" id="porcentaje" placeholder="Porcentaje (ej: 10)">
        <input type="number" id="total" placeholder="Total (ej: 160)">
        <button onclick="calcular()">Calcular</button>
        <p id="resultado"></p>
    </div>

    <script>
        function calcular() {
            let p = document.getElementById("porcentaje").value;
            let t = document.getElementById("total").value;
            let r = (p * t) / 100;
            document.getElementById("resultado").innerText = "✅ El " + p + "% de " + t + " es: " + r;
        }
    </script>
</body>
</html>
