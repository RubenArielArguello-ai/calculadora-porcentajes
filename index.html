<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <title>Calculadora de Porcentaje</title>

  <!-- Le dice al HTML que use tu archivo de estilos -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="calculadora">

    <!-- VISOR: muestra lo que el usuario tipea y el resultado -->
    <div id="visor">
      <div id="expresion">10 % de 160</div>
      <!-- expresion = la línea pequeña de arriba que muestra el cálculo -->
      <div id="resultado">0</div>
      <!-- resultado = el número grande -->
    </div>

    <!-- BOTONES: organizados en filas como tu boceto -->
    <div class="botones">

      <!-- Fila 1: 1, 2, 3 -->
      <button onclick="ingresarNum('1')">1</button>
      <button onclick="ingresarNum('2')">2</button>
      <button onclick="ingresarNum('3')">3</button>

      <!-- Fila 2: 4, 5, 6 -->
      <button onclick="ingresarNum('4')">4</button>
      <button onclick="ingresarNum('5')">5</button>
      <button onclick="ingresarNum('6')">6</button>

      <!-- Fila 3: 7, 8, 9 -->
      <button onclick="ingresarNum('7')">7</button>
      <button onclick="ingresarNum('8')">8</button>
      <button onclick="ingresarNum('9')">9</button>

      <!-- Fila 4: %de, 0, = -->
      <button class="btn-especial" onclick="ingresarPorcentoDe()">% de</button>
      <button onclick="ingresarNum('0')">0</button>
      <button class="btn-igual" onclick="calcular()">=</button>

    </div>

    <!-- Botón limpiar separado, arriba o abajo -->
    <button class="btn-limpiar" onclick="limpiar()">borrar</button>

  </div>

  <!-- Le dice al HTML que use tu archivo de lógica -->
  <script src="script.js"></script>

</body>
</html>
